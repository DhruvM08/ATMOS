spring.application.name=weather-service
server.port=8083
spring.main.allow-bean-definition-overriding=true

eureka.client.service-url.defaultZone=http://${EUREKA_SERVER:localhost}:8761/eureka/
eureka.instance.prefer-ip-address=true

# MongoDB (with local fallback)
spring.data.mongodb.uri=${MONGODB_WEATHER_URI:mongodb://localhost:27017/smartweather}

# Weather API Keys
weather.api1.key=${OPENWEATHER_API_KEY}
weather.api2.key=${ACCUWEATHER_API_KEY}
weather.api3.key=${FORECA_API_KEY}
weather.api4.key=${WEATHERSTACK_API_KEY}
weather.api5.key=${WEATHERAPI_KEY}
weather.api6.key=${NEWS_API_KEY}

# Redis Connection
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# Actuator exposure
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# Distributed Tracing - Zipkin
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}

# Logging pattern with traceId and spanId
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=weather-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

api.version=v1

# --- LOCAL TEST LOGGING (Suppresses noise from missing services) ---
logging.level.com.netflix.discovery=ERROR
logging.level.com.netflix.eureka=ERROR
logging.level.zipkin2.reporter=ERROR
logging.level.net.logstash.logback=ERROR
logging.level.org.springframework.cloud.config.client=ERROR
logging.level.org.apache.kafka=ERROR
