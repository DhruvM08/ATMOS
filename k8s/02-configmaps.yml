# =====================================================
# ATMOS ConfigMaps — Shared environment configuration
# =====================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: atmos-config
  namespace: atmos
data:
  # Eureka
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
  # Kafka
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  # Zipkin
  MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: "http://zipkin:9411/api/v2/spans"
  MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
  # Logstash
  LOGSTASH_HOST: "logstash"
  # SMTP host/port
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  # API Version
  API_VERSION: "v1"

---
# =====================================================
# Prometheus scrape configuration
# =====================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: atmos
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'service-registry'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['service-registry:8761']

      - job_name: 'gateway-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['gateway-service:8080']

      - job_name: 'auth-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['auth-service:8081']

      - job_name: 'notification-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['notification-service:8082']

      - job_name: 'weather-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['weather-service:8083']

      - job_name: 'astronomy-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['astronomy-service:8084']

      - job_name: 'news-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['news-service:8085']

---
# =====================================================
# Logstash pipeline configuration
# =====================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: atmos
data:
  logstash.conf: |
    input {
      tcp {
        port => 5000
        codec => json_lines
      }
    }

    output {
      elasticsearch {
        hosts => ["elasticsearch:9200"]
        index => "atmos-logs-%{+YYYY.MM.dd}"
      }
      stdout { codec => rubydebug }
    }
