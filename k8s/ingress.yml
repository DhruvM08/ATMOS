# =====================================================
# Ingress — External access via domain name (optional)
# =====================================================
# Use this if you have an Ingress Controller (nginx, traefik, etc.)
# For Minikube: minikube addons enable ingress
# For cloud: use the cloud provider's Ingress Controller
#
# If using LoadBalancer on gateway-service, you may not need this.
# This gives you clean URL routing via a domain name.
# =====================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atmos-ingress
  namespace: atmos
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    # ── Main API traffic → Gateway ──
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 8080

    # ── Monitoring dashboards (optional) ──
    - http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
          - path: /kibana
            pathType: Prefix
            backend:
              service:
                name: kibana
                port:
                  number: 5601
          - path: /zipkin
            pathType: Prefix
            backend:
              service:
                name: zipkin
                port:
                  number: 9411
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
          - path: /kafka-ui
            pathType: Prefix
            backend:
              service:
                name: kafka-ui
                port:
                  number: 8989
