# =====================================================
# Logstash — Log ingestion pipeline
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: atmos
  labels:
    app: logstash
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      initContainers:
        - name: wait-for-elasticsearch
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z elasticsearch 9200; do echo "Waiting for Elasticsearch..."; sleep 5; done;']
      containers:
        - name: logstash
          image: logstash:8.11.1
          ports:
            - containerPort: 5000
          env:
            - name: LS_JAVA_OPTS
              value: "-Xms256m -Xmx256m"
          resources:
            requests:
              memory: "512Mi"
              cpu: "300m"
            limits:
              memory: "768Mi"
              cpu: "600m"
          volumeMounts:
            - name: logstash-pipeline
              mountPath: /usr/share/logstash/pipeline/logstash.conf
              subPath: logstash.conf
              readOnly: true
      volumes:
        - name: logstash-pipeline
          configMap:
            name: logstash-config

---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: atmos
spec:
  selector:
    app: logstash
  ports:
    - port: 5000
      targetPort: 5000
  clusterIP: None
