# =====================================================
# Service Registry (Eureka) — Must start FIRST
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-registry
  namespace: atmos
  labels:
    app: service-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-registry
  template:
    metadata:
      labels:
        app: service-registry
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z kafka 9092; do echo "Waiting for Kafka..."; sleep 3; done;']
      containers:
        - name: service-registry
          image: atmosregistry1213.azurecr.io/service-registry:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8761
          envFrom:
            - configMapRef:
                name: atmos-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "384Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: service-registry
  namespace: atmos
spec:
  selector:
    app: service-registry
  ports:
    - port: 8761
      targetPort: 8761
  type: LoadBalancer
