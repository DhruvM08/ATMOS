# =====================================================
# Notification Service — Kafka consumer, email & alerts
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: atmos
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      initContainers:
        - name: wait-for-eureka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z service-registry 8761; do echo "Waiting for Eureka..."; sleep 5; done;']
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z kafka 9092; do echo "Waiting for Kafka..."; sleep 3; done;']
      containers:
        - name: notification-service
          image: atmosregistry1213.azurecr.io/notification-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: atmos-config
          env:
            - name: spring.data.mongodb.uri
              valueFrom:
                secretKeyRef:
                  name: atmos-secrets
                  key: MONGODB_NOTIFICATION_URI
            - name: weather.api1.key
              valueFrom:
                secretKeyRef:
                  name: atmos-secrets
                  key: OPENWEATHER_API_KEY
            - name: spring.mail.host
              valueFrom:
                configMapKeyRef:
                  name: atmos-config
                  key: SMTP_HOST
            - name: spring.mail.port
              valueFrom:
                configMapKeyRef:
                  name: atmos-config
                  key: SMTP_PORT
            - name: spring.mail.username
              valueFrom:
                secretKeyRef:
                  name: atmos-secrets
                  key: SMTP_USERNAME
            - name: spring.mail.password
              valueFrom:
                secretKeyRef:
                  name: atmos-secrets
                  key: SMTP_PASSWORD
            - name: spring.mail.properties.mail.smtp.auth
              value: "true"
            - name: spring.mail.properties.mail.smtp.starttls.enable
              value: "true"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "384Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 120
            timeoutSeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 180
            timeoutSeconds: 5
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: atmos
spec:
  selector:
    app: notification-service
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
