# =====================================================
# Gateway Service — API Gateway (entry point)
# Deploy LAST among application services
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: atmos
  labels:
    app: gateway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      initContainers:
        - name: wait-for-eureka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z service-registry 8761; do echo "Waiting for Eureka..."; sleep 5; done;']
        - name: wait-for-auth
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z auth-service 8081; do echo "Waiting for Auth Service..."; sleep 5; done;']
      containers:
        - name: gateway-service
          image: atmosregistry1213.azurecr.io/gateway-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: atmos-config
          env:
            - name: spring.data.redis.url
              valueFrom:
                secretKeyRef:
                  name: atmos-secrets
                  key: REDIS_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "384Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20

---
# Gateway is the ONLY service exposed externally via LoadBalancer.
# All other services are internal (ClusterIP).
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: atmos
spec:
  selector:
    app: gateway-service
  ports:
    - port: 8080
      targetPort: 8080
  type: LoadBalancer  # Exposes gateway externally
