# =====================================================
# News Service — Environment & Science news aggregation
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-service
  namespace: atmos
  labels:
    app: news-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: news-service
  template:
    metadata:
      labels:
        app: news-service
    spec:
      initContainers:
        - name: wait-for-eureka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z service-registry 8761; do echo "Waiting for Eureka..."; sleep 5; done;']
      containers:
        - name: news-service
          image: atmosregistry1213.azurecr.io/news-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8085
          envFrom:
            - configMapRef:
                name: atmos-config
          env:
            - name: spring.data.mongodb.uri
              valueFrom:
                secretKeyRef:
                  name: atmos-secrets
                  key: MONGODB_NEWS_URI
            - name: weather.api6.key
              valueFrom:
                secretKeyRef:
                  name: atmos-secrets
                  key: NEWS_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 10
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: news-service
  namespace: atmos
spec:
  selector:
    app: news-service
  ports:
    - port: 8085
      targetPort: 8085
  type: ClusterIP
