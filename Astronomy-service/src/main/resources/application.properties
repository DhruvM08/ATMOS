spring.application.name=astronomy-service
server.port=8084

# Service Registry (Eureka)
eureka.client.service-url.defaultZone=http://${EUREKA_SERVER:localhost}:8761/eureka/
eureka.instance.prefer-ip-address=true

# MongoDB URI (with environment variable and fallback)
spring.data.mongodb.uri=${MONGODB_ASTRONOMY_URI:mongodb://localhost:27017/smartweather}

# External API Configuration
weather.api5.key=${WEATHERAPI_KEY}

# Actuator Endpoints (Production Ready: Only expose necessary endpoints)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.prometheus.metrics.export.enabled=true

# Distributed Tracing - Zipkin (Parameterized for Production)
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}

# Logging Configuration
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Suppress noise from discovery and tracing in production/test
logging.level.com.netflix.discovery=ERROR
logging.level.com.netflix.eureka=ERROR
logging.level.zipkin2.reporter=ERROR

api.version=v1
