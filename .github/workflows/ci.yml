name: ATMOS CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # Define your services and their exact folder names
    strategy:
      matrix:
        include:
          - folder: 'weather-service'
            image: 'weather-service'
          - folder: 'auth-service'
            image: 'auth-service'
          - folder: 'gateway-service'
            image: 'gateway-service'
          - folder: 'news-service'
            image: 'news-service'
          - folder: 'notification-service'
            image: 'notification-service'
          - folder: 'Astronomy-service'     # Fixed Case Sensitivity issue
            image: 'astronomy-service'
          - folder: 'service-registry'
            image: 'service-registry'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: ./${{ matrix.folder }}
        
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: atmosregistry1213.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
          
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.folder }}
          push: true
          # Tags it with both 'latest' and the specific Git commit hash for Azure
          tags: |
            atmosregistry1213.azurecr.io/${{ matrix.image }}:latest
            atmosregistry1213.azurecr.io/${{ matrix.image }}:${{ github.sha }}
