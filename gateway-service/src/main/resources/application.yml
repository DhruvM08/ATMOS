server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: gateway-service
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  cloud:
    loadbalancer:
      eager-load:
        clients:
          - auth-service
          - notification-service
          - weather-service
          - astronomy-service
          - news-service
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # Auth Service
        - id: auth-service-login
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/user/**
          filters:
            - name: RateLimit
              args:
                category: authLimit
            - name: CircuitBreaker
              args:
                name: authService
                fallbackUri: forward:/fallback/auth
            - name: Retry
              args:
                retries: 3
                methods: GET,POST
                series: SERVER_ERROR
                exceptions: java.io.IOException, java.util.concurrent.TimeoutException, org.springframework.cloud.gateway.support.TimeoutException
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
                  factor: 2
                  basedOnPreviousValue: true

        # Notification Service
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - AuthenticationFilter
            - name: RateLimit
              args:
                category: notificationLimit
            - name: CircuitBreaker
              args:
                name: notificationService
                fallbackUri: forward:/fallback/notification
            - name: Retry
              args:
                retries: 3
                methods: GET,POST
                series: SERVER_ERROR
                exceptions: java.io.IOException, java.util.concurrent.TimeoutException, org.springframework.cloud.gateway.support.TimeoutException
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
                  factor: 2
                  basedOnPreviousValue: true

        # Weather Service
        - id: weather-service
          uri: lb://weather-service
          predicates:
            - Path=/api/v1/weather/**
          filters:
            - AuthenticationFilter
            - name: RateLimit
              args:
                category: weatherLimit
            - name: CircuitBreaker
              args:
                name: weatherService
                fallbackUri: forward:/fallback/weather
            - name: Retry
              args:
                retries: 3
                methods: GET,POST
                series: SERVER_ERROR
                exceptions: java.io.IOException, java.util.concurrent.TimeoutException, org.springframework.cloud.gateway.support.TimeoutException
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
                  factor: 2
                  basedOnPreviousValue: true

        # Astronomy Service
        - id: astronomy-service
          uri: lb://astronomy-service
          predicates:
            - Path=/api/v1/astronomy/**
          filters:
            - AuthenticationFilter
            - name: RateLimit
              args:
                category: astronomyLimit
            - name: CircuitBreaker
              args:
                name: astronomyService
                fallbackUri: forward:/fallback/astronomy
            - name: Retry
              args:
                retries: 3
                methods: GET,POST
                series: SERVER_ERROR
                exceptions: java.io.IOException, java.util.concurrent.TimeoutException, org.springframework.cloud.gateway.support.TimeoutException
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
                  factor: 2
                  basedOnPreviousValue: true

        # News Service
        - id: news-service
          uri: lb://news-service
          predicates:
            - Path=/api/v1/news/**
          filters:
            - AuthenticationFilter
            - name: RateLimit
              args:
                category: newsLimit
            - name: CircuitBreaker
              args:
                name: newsService
                fallbackUri: forward:/fallback/news
            - name: Retry
              args:
                retries: 3
                methods: GET,POST
                series: SERVER_ERROR
                exceptions: java.io.IOException, java.util.concurrent.TimeoutException, org.springframework.cloud.gateway.support.TimeoutException
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
                  factor: 2
                  basedOnPreviousValue: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://${EUREKA_SERVER:localhost}:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
    initial-instance-info-replication-interval-seconds: 5
    registry-fetch-interval-seconds: 5
    should-unregister-on-shutdown: true

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    org.springframework.cloud.gateway: INFO
    com.netflix.discovery: ERROR
    com.netflix.eureka: ERROR
    zipkin2.reporter: ERROR

# Custom Rate Limit Configuration
ratelimit:
  categories:
    authLimit:
      capacity: 7
      refillTokens: 7
      refillDuration: 1
      durationUnit: MINUTES
    weatherLimit:
      capacity: 25
      refillTokens: 25
      refillDuration: 1
      durationUnit: MINUTES
    newsLimit:
      capacity: 25
      refillTokens: 25
      refillDuration: 1
      durationUnit: MINUTES
    astronomyLimit:
      capacity: 25
      refillTokens: 25
      refillDuration: 1
      durationUnit: MINUTES
    notificationLimit:
      capacity: 25
      refillTokens: 25
      refillDuration: 1
      durationUnit: MINUTES

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      authService:
        baseConfig: default
      notificationService:
        baseConfig: default
      weatherService:
        baseConfig: default
      astronomyService:
        baseConfig: default
      newsService:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
    instances:
      authService:
        baseConfig: default
      notificationService:
        baseConfig: default
      weatherService:
        baseConfig: default
      astronomyService:
        baseConfig: default
      newsService:
        baseConfig: default

api.version: v1
