spring.application.name=auth-service
server.port=8081

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# MongoAtlas Connection
spring.data.mongodb.uri=${MONGODB_AUTH_URI:mongodb://localhost:27017/smartweather}

# Redis Connection (For Rate Limiting / Session if needed)
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# Actuator exposure
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Resilience4j Circuit Breaker Config for Auth
resilience4j.circuitbreaker.instances.auth.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.auth.slidingWindowSize=5
resilience4j.circuitbreaker.instances.auth.minimumNumberOfCalls=3
resilience4j.circuitbreaker.instances.auth.failureRateThreshold=50
resilience4j.circuitbreaker.instances.auth.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.auth.permittedNumberOfCallsInHalfOpenState=2
resilience4j.circuitbreaker.instances.auth.automaticTransitionFromOpenToHalfOpenEnabled=true

management.prometheus.metrics.export.enabled=true

# Distributed Tracing - Zipkin
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Logging pattern with traceId and spanId
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=auth-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

api.version=v1


